            React.createElement('i', { className: 'fas fa-lock', style: { color: '#f39b7d' } }),
            ' Painel Administrativo '
          ),
          React.createElement('p', {
            style: {
              marginTop: '-1rem',
              marginBottom: '2rem',
              color: '#b9b0cf',
              fontSize: '1rem',
              display: 'flex',
              alignItems: 'center',
              gap: '0.5rem'
            }
          },
            React.createElement('i', { className: 'fas fa-info-circle', style: { color: '#b57edc' } }),
            ' Screenshots do painel de administração dos sites acima (acesso restrito ao admin)'
          ),
          React.createElement('div', { className: 'admin-gallery' },
            adminScreenshots.map(function (screenshot, i) {
              return React.createElement('div', {
                className: 'admin-screenshot-item',
                key: i,
                onClick: function () {
                  openImageModal(screenshot.imageUrl, screenshot.alt);
                }
              },
                React.createElement('div', { className: 'admin-screenshot-image' },
                  React.createElement('span', { className: 'admin-badge' },
                    React.createElement('i', { className: 'fas fa-shield-alt', style: { marginRight: '4px' } }),
                    'Admin'
                  ),
                  React.createElement('img', {
                    src: screenshot.imageUrl,
                    alt: screenshot.alt,
                    onError: function (e) {
                      var parent = e.target.parentElement.parentElement;
                      e.target.style.display = 'none';
                      if (!parent.querySelector('.error-placeholder')) {
                        var errorDiv = document.createElement('div');
                        errorDiv.className = 'error-placeholder';
                        errorDiv.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;background:#1a1625;position:absolute;inset:0;';
                        errorDiv.innerHTML = '<i class="fas fa-image" style="font-size:3rem;color:#b57edc;opacity:0.5;"></i>';
                        parent.querySelector('.admin-screenshot-image').appendChild(errorDiv);
                      }
                    }
                  }),
                  React.createElement('div', { className: 'admin-screenshot-overlay' },
                    React.createElement('i', { className: 'fas fa-search-plus' })
                  )
                ),
                React.createElement('div', { className: 'admin-screenshot-info' },
                  React.createElement('h4', null,
                    React.createElement('i', { className: 'fas fa-cog' }),
                    screenshot.label
                  ),
                  React.createElement('p', null, screenshot.description)
                )
              );
            })
          ),
          React.createElement('div', {
            style: {
              marginTop: '1.5rem',
              padding: '1rem 1.5rem',
              background: 'rgba(181, 126, 220, 0.08)',
              border: '1px solid rgba(181, 126, 220, 0.2)',
              borderRadius: '12px',
              display: 'flex',
              alignItems: 'center',
              gap: '0.8rem'
            }
          },
            React.createElement('i', {
              className: 'fas fa-lightbulb',
              style: { color: '#f9d976', fontSize: '1.5rem' }
            }),
            React.createElement('p', {
              style: { color: '#b9b0cf', fontSize: '0.9rem', margin: 0 }
            }, 'Clique nas imagens para ampliar e ver os detalhes do painel administrativo.')
          )
        ),

        // RODAPÉ
        React.createElement('hr', null),
        React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '0.8rem', color: '#9486b0' } },
          React.createElement('span', null,
            React.createElement('i', { className: 'fas fa-map-marker-alt' }), ' ', profile.address
          ),
          React.createElement('span', null,
            React.createElement('i', { className: 'fas fa-envelope' }), ' ', profile.email
          ),
          React.createElement('span', null,
            React.createElement('i', { className: 'fab fa-github' }), ' ',
            React.createElement('a', { href: profile.github, style: { color: '#b89fe0' }, target: '_blank' }, 'github')
          ),
          React.createElement('span', null,
            React.createElement('i', { className: 'fas fa-globe' }), ' ',
            React.createElement('a', { href: profile.itch, style: { color: '#b89fe0' }, target: '_blank' }, 'itch.io')
          )
        )
      );
    }

    
    function openImageModal(imageUrl, alt) {
      var existingModal = document.querySelector('.admin-modal');
      if (existingModal) existingModal.remove();

      var modal = document.createElement('div');
      modal.className = 'admin-modal active';
      modal.onclick = function (e) {
        if (e.target === modal) modal.remove();
      };

      var img = document.createElement('img');
      img.src = imageUrl;
      img.alt = alt;

      var closeBtn = document.createElement('span');
      closeBtn.className = 'admin-modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function () { modal.remove(); };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') modal.remove();
      });

      modal.appendChild(closeBtn);
      modal.appendChild(img);
      document.body.appendChild(modal);
    }

    
    function openPhotoModal(imageUrl, label) {
      var existingModal = document.querySelector('.photo-modal');
      if (existingModal) existingModal.remove();

      var modal = document.createElement('div');
      modal.className = 'photo-modal active';

      modal.onclick = function (e) {
        if (e.target === modal) {
          modal.classList.remove('active');
          setTimeout(function () { modal.remove(); }, 300);
        }
      };

      var content = document.createElement('div');
      content.className = 'photo-modal-content';
      content.onclick = function (e) {
        e.stopPropagation();
      };

      var img = document.createElement('img');
      img.src = imageUrl;
      img.alt = label;
      img.onerror = function () {
        img.src = 'https://via.placeholder.com/800x600/1a1625/b57edc?text=Imagem+não+encontrada';
      };

      var labelEl = document.createElement('div');
      labelEl.className = 'photo-modal-label';
      labelEl.textContent = label;

      var closeBtn = document.createElement('span');
      closeBtn.className = 'photo-modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function (e) {
        e.stopPropagation();
        modal.classList.remove('active');
        setTimeout(function () { modal.remove(); }, 300);
      };

      function handleEscKey(e) {
        if (e.key === 'Escape') {
          modal.classList.remove('active');
          setTimeout(function () { modal.remove(); }, 300);
          document.removeEventListener('keydown', handleEscKey);
        }
      }
      document.addEventListener('keydown', handleEscKey);

      content.appendChild(img);
      content.appendChild(labelEl);
      modal.appendChild(closeBtn);
      modal.appendChild(content);
      document.body.appendChild(modal);

      modal.addEventListener('transitionend', function () {
        if (!modal.classList.contains('active')) {
          document.body.style.overflow = '';
        }
      });
    }

    
    function openVideoModal(videoUrl, label) {
      var existingModal = document.querySelector('.video-modal');
      if (existingModal) existingModal.remove();

      var modal = document.createElement('div');
      modal.className = 'video-modal active';

      modal.onclick = function (e) {
        if (e.target === modal) {
          closeVideoModal(modal);
        }
      };

      var content = document.createElement('div');
      content.className = 'video-modal-content';
      content.onclick = function (e) {
        e.stopPropagation();
      };

      var video = document.createElement('video');
      video.src = videoUrl;
      video.controls = true;
      video.autoplay = true;
      video.style.cssText = 'max-width:90vw;max-height:80vh;border-radius:12px;box-shadow:0 20px 60px rgba(181,126,220,0.3);border:2px solid #382f4a;';

      var labelEl = document.createElement('div');
      labelEl.className = 'video-modal-label';
      labelEl.textContent = label;

      var closeBtn = document.createElement('span');
      closeBtn.className = 'video-modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function (e) {
        e.stopPropagation();
        closeVideoModal(modal);
      };

      function handleEscKey(e) {
        if (e.key === 'Escape') {
          closeVideoModal(modal);
          document.removeEventListener('keydown', handleEscKey);
        }
      }
      document.addEventListener('keydown', handleEscKey);

      content.appendChild(video);
      content.appendChild(labelEl);
      modal.appendChild(closeBtn);
      modal.appendChild(content);
      document.body.appendChild(modal);
    }

    function closeVideoModal(modal) {
      modal.classList.remove('active');
      
      var video = modal.querySelector('video');
      if (video) {
        video.pause();
        video.currentTime = 0;
      }
      setTimeout(function () { modal.remove(); }, 300);
    }

    // ===== RENDERIZAR =====

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
