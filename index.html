    // Função para abrir modal com imagem ampliada
    function openImageModal(imageUrl, alt) {
      var existingModal = document.querySelector('.admin-modal');
      if (existingModal) existingModal.remove();

      var modal = document.createElement('div');
      modal.className = 'admin-modal active';
      modal.onclick = function (e) {
        if (e.target === modal) modal.remove();
      };

      var img = document.createElement('img');
      img.src = imageUrl;
      img.alt = alt;

      var closeBtn = document.createElement('span');
      closeBtn.className = 'admin-modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function () { modal.remove(); };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') modal.remove();
      });

      modal.appendChild(closeBtn);
      modal.appendChild(img);
      document.body.appendChild(modal);
    }

    // Função para abrir modal de foto com zoom
    function openPhotoModal(imageUrl, label) {
      // Remove modal existente se houver
      var existingModal = document.querySelector('.photo-modal');
      if (existingModal) existingModal.remove();

      // Criar modal
      var modal = document.createElement('div');
      modal.className = 'photo-modal active';

      // Fechar ao clicar no fundo
      modal.onclick = function (e) {
        if (e.target === modal) {
          modal.classList.remove('active');
          setTimeout(function () { modal.remove(); }, 300);
        }
      };

      // Container do conteúdo
      var content = document.createElement('div');
      content.className = 'photo-modal-content';
      content.onclick = function (e) {
        e.stopPropagation(); // Evita fechar ao clicar na imagem
      };

      // Imagem ampliada
      var img = document.createElement('img');
      img.src = imageUrl;
      img.alt = label;
      img.onerror = function () {
        img.src = 'https://via.placeholder.com/800x600/1a1625/b57edc?text=Imagem+não+encontrada';
      };

      // Label da imagem
      var labelEl = document.createElement('div');
      labelEl.className = 'photo-modal-label';
      labelEl.textContent = label;

      // Botão fechar
      var closeBtn = document.createElement('span');
      closeBtn.className = 'photo-modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function (e) {
        e.stopPropagation();
        modal.classList.remove('active');
        setTimeout(function () { modal.remove(); }, 300);
      };

      // Fechar com tecla ESC
      function handleEscKey(e) {
        if (e.key === 'Escape') {
          modal.classList.remove('active');
          setTimeout(function () { modal.remove(); }, 300);
          document.removeEventListener('keydown', handleEscKey);
        }
      }
      document.addEventListener('keydown', handleEscKey);

      // Montar modal
      content.appendChild(img);
      content.appendChild(labelEl);
      modal.appendChild(closeBtn);
      modal.appendChild(content);
      document.body.appendChild(modal);

      // Prevenir scroll do body
      //document.body.style.overflow = 'hidden';

      // Restaurar scroll quando fechar
      modal.addEventListener('transitionend', function () {
        if (!modal.classList.contains('active')) {
          document.body.style.overflow = '';
        }
      });
    }

    // ===== RENDERIZAR =====

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>

</html>
